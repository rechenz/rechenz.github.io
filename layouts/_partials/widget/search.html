{{- $searchPage := .Context.Site.GetPage "/search" -}}
{{- if $searchPage -}}
    <form action="{{ $searchPage.RelPermalink }}" class="search-form widget" data-json="{{ $searchPage.Permalink }}index.json">
        <p>
            <label>{{ T "search.title" }}</label>
            <input name="keyword" required placeholder="{{ T `search.placeholder` }}" />
        
            <button title="{{ T `search.title` }}">
                {{ partial "helper/icon" "search" }}
            </button>
        </p>
    </form>
{{- else -}}
    {{- warnf "Search page not found." -}}
{{- end -}}
