baseURL: "https://rechenz.github.io/"
locale: "zh-CN"
title: "热尘的博客"
theme: "hugo-theme-stack"

pagination:
    pagerSize: 10

outputFormats:
  json:
    mediaType: application/json
    baseName: index
    isPlainText: true
    notAlternative: true

defaultContentLanguage: "zh-cn"

enableEmoji: true

languages:
    zh-cn:
        label: "中文"
        title: "热尘的博客"
        description: "游戏、代码、胡思乱想"
        weight: 1

params:
    mainSections: ["post"]
    rssFullContent: true
    SortBy: "default"

    footer:
        since: 2026
        customText: ""

    dateFormat:
        published: ":date_full"
        lastUpdated: ":date_full"

    sidebar:
        compact: false
        avatar: ""
        subtitle: "游戏开发者 · AI 爱好者"
        emoji: "🐺"
        status:
            emoji: "🟢"
            message: "在线"

    article:
        headingAnchor: false
        math: false
        toc: true
        readingTime: true
        license:
            enabled: false
            default: "Licensed under CC BY-NC-SA 4.0"
        list:
            showTags: false

    widgets:
        homepage:
            - type: search
            - type: archives
              params:
                  limit: 5
            - type: tag-cloud
              params:
                  max: 10
        page:
            - type: toc

    colorScheme:
        toggle: true
        default: "auto"

    imageProcessing:
        content:
            enabled: true
            widths: [800, 1600, 2400]
        thumbnail:
            enabled: true

    comments:
        enabled: false

    opengraph:
        twitter:
            site: ""
            card: "summary_large_image"

menu:
    social:
        - identifier: github
          name: GitHub
          url: https://github.com/rechenz
          params:
              icon: brand-github

    main:
        - identifier: home
          name: 首页
          url: /
          weight: 1
        - identifier: archives
          name: 归档
          url: /archives/
          weight: 2
        - identifier: tags
          name: 标签
          url: /tags/
          weight: 3
        - identifier: search
          name: 搜索
          url: /search/
          weight: 4
