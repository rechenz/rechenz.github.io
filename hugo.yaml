baseURL: "https://rechenz.github.io/"
languageCode: "zh-cn"
title: "热尘的博客"
theme: "PaperMod"
pagination:
  pagerSize: 10

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  title: "热尘的博客"
  description: "游戏、代码、胡思乱想"
  keywords: [Blog, Game, UE5, Go]
  author: "热尘"
  images: [""]
  DateFormat: "2006-01-02"
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    disableHLJS: true
    disableFingerprinting: true

  social:
    - name: github
      url: "https://github.com/rechenz"

  homeInfoParams:
    Title: "你好，我是热尘"
    Content: "游戏开发者 · AI 爱好者 · 星核猎客"

menu:
  main:
    - identifier: search
      name: 搜索
      url: /search/
      weight: 1
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 2
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 3

markup:
  highlight:
    # anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai
